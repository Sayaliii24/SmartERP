services:
  - type: web
    name: smarter-backendd
    runtime: docker
    dockerfilePath: ./smarterp-backend/Dockerfile
    dockerContext: ./smarterp-backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smarterp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://smarterp-frontend.vercel.app

databases:
  - name: smarterp-db
    plan: free
    databaseName: smarterp
    user: smarterp_user
