# Server Port - Render sets PORT env var
server.port=${PORT:8080}

# Database - URL is set programmatically in SmartERPApplication.main()
# for Render deployments (converts postgres:// to jdbc:postgresql:// + SSL)
# Fallback for local development only:
spring.datasource.url=${spring.datasource.url:jdbc:postgresql://localhost:5432/smarterp}
spring.datasource.username=${spring.datasource.username:postgres}
spring.datasource.password=${spring.datasource.password:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool settings for free tier
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Properties
smarterp.jwt.secret=${JWT_SECRET:9a67a869c36208a5cf7f298cd4a123bc6df157e937dcf564f93e98ab1efcdb6c}
smarterp.jwt.expiration-ms=86400000

# CORS Configuration
smarterp.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://smarterp-frontend.vercel.app}
