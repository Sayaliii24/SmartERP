# Server Port
server.port=8080

# Database Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smarterp}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Properties
smarterp.jwt.secret=${JWT_SECRET:9a67a869c36208a5cf7f298cd4a123bc6df157e937dcf564f93e98ab1efcdb6c}
smarterp.jwt.expiration-ms=86400000

# CORS Configuration
smarterp.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://smarterp-frontend.vercel.app}

