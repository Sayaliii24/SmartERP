# Server Port
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/smarterp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Secret Properties
# HS256 requires key of size 256 bits (32 bytes) or more. This is a 256-bit hex key.
smarterp.jwt.secret=9a67a869c36208a5cf7f298cd4a123bc6df157e937dcf564f93e98ab1efcdb6c
smarterp.jwt.expiration-ms=86400000
