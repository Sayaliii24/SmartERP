services:
  postgres:
    image: postgres:15-alpine
    container_name: smarterp-postgres
    environment:
      - POSTGRES_DB=smarterp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - smarterp-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smarterp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./smarterp-backend
      dockerfile: Dockerfile
    container_name: smarterp-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/smarterp
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./smarterp-frontend
      dockerfile: Dockerfile
    container_name: smarterp-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  smarterp-pgdata:

