version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smarterp-postgres
    environment:
      - POSTGRES_DB=smarterp
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - smarterp-pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  smarterp-pgdata:
